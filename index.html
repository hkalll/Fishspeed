<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Game App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        iframe {
            border: none;
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <iframe 
            id="main-game-frame" 
            src="https://fishing-pro-as.maxbet.com.mm/" 
            allow="autoplay; fullscreen; accelerometer; gyroscope">
        </iframe>
    </div>

    <script>
        // Initialize Telegram WebApp for Full Screen
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const gameIframe = document.getElementById('main-game-frame');

        // Automatic Speed Hack (2.5x) 
        // This will run in the background after you log in manually
        setInterval(() => {
            try {
                const gameWindow = gameIframe.contentWindow;
                if (gameWindow.cc && gameWindow.cc.director) {
                    gameWindow.cc.director.getScheduler().setTimeScale(2.5);
                }
            } catch (error) {
                // Silently handle cross-origin restrictions
            }
        }, 1500);

        // Fix for Viewport on Mobile
        window.addEventListener('resize', () => {
            document.body.style.height = window.innerHeight + 'px';
        });
    </script>
</body>
</html>
